<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>🚗</span>
      <span class="logo-name">DealerOS</span>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="nav-active" class="nav-item">
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ auth.currentUser()?.name?.[0] ?? 'U' }}</div>
        <div class="user-details">
          <p class="user-name">{{ auth.currentUser()?.name }}</p>
          <p class="user-role">{{ auth.currentUser()?.role }}</p>
        </div>
      </div>
      <button class="logout-btn" (click)="auth.logout()">⏻</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <router-outlet />
  </main>
</div>
